<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sims Overlay</title>
<style>
body { margin:0; overflow:hidden; background:transparent; }
canvas { display:block; }
</style>
</head>
<body>

<script type="module">
import * as THREE from './libs/three.module.js';
import { GLTFLoader } from './libs/GLTFLoader.js';

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

camera.position.z = 20;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 10, 10);
scene.add(light);
scene.add(new THREE.AmbientLight(0x888888));

// ── Add or remove models here ─────────────────────────────────────────────
const simConfigs = [
  { file: 'models/Dr.F.glb',    startX:   0,  startDir: 'left'  },
  { file: 'models/Buddy.glb',   startX:  -2,  startDir: 'right' },
  { file: 'models/Chef.glb',    startX:   2,  startDir: 'left'  },
  { file: 'models/Candy.glb',   startX:  -4,  startDir: 'right' },
  { file: 'models/Poppy.glb',   startX:   4,  startDir: 'left'  },
  { file: 'models/Chaz.glb',    startX:  -6,  startDir: 'right' },
  { file: 'models/Travis.glb',  startX:   6,  startDir: 'left'  },
  { file: 'models/Violet.glb',  startX:   8,  startDir: 'right' },
  { file: 'models/Nova.glb',    startX:  -8,  startDir: 'left'  },
  { file: 'models/Paul.glb',    startX: -10,  startDir: 'right' },
  { file: 'models/Evelyn.glb',  startX:  10,  startDir: 'left'  },
  { file: 'models/Yuki.glb',    startX: -12,  startDir: 'right' },
  { file: 'models/Carl.glb',    startX:  12,  startDir: 'left'  },
  { file: 'models/Wolfah.glb',  startX: -14,  startDir: 'right' },
  { file: 'models/Tobor.glb',   startX:  14,  startDir: 'left'  },
];

const FACE_RIGHT =  Math.PI / 2;
const FACE_LEFT  = -Math.PI / 2;

const loader = new GLTFLoader();
const sims   = [];

simConfigs.forEach(config => {

  loader.load(config.file, gltf => {

    const model = gltf.scene;

    model.rotation.y = config.startDir === 'right' ? FACE_RIGHT : FACE_LEFT;
    model.position.set(config.startX, 0, 0);
    model.scale.set(1, 1, 1);

    scene.add(model);

    const mixer = new THREE.AnimationMixer(model);

    const actions = {};
    gltf.animations.forEach(clip => {
      actions[clip.name.toLowerCase()] = mixer.clipAction(clip);
    });

    const walk     = actions['walk'];
    const idle     = actions['idle'];
    const wave     = actions['wave'];
    const turn     = actions['turn'];
    const pause    = actions['pause'];    // 15 frame stand loop
    const surprise = actions['surprise'];

    [walk, idle, wave, turn, pause, surprise].forEach(a => {
      if (!a) return;
      a.setLoop(THREE.LoopOnce);
      a.clampWhenFinished = false;
    });

    // pause clip loops 3 times before rolling — handled manually below
    if (pause) {
      pause.setLoop(THREE.LoopRepeat, 3);
    }

    let state          = "walk";
    let direction      = config.startDir;
    let stepsRemaining = randomSteps();
    let pendingTurnTo  = null;

    function facingAngle() {
      return direction === "right" ? FACE_RIGHT : FACE_LEFT;
    }

    walk.play();

    // ── Finished event ────────────────────────────────────────────────────
    mixer.addEventListener("finished", e => {

      if (e.action === walk && state === "walk") {
        stepsRemaining--;
        if (stepsRemaining > 0) {
          walk.reset().play();
        } else {
          afterWalk();
        }
      }

      if (e.action === turn && state === "turn") {
        turn.stop();
        model.rotation.y = pendingTurnTo;
        pendingTurnTo = null;
        resumeWalking();
      }

      if (e.action === wave && state === "wave") {
        wave.stop();
        model.rotation.y = facingAngle();
        resumeWalking();
      }

      if (e.action === surprise && state === "surprise") {
        surprise.stop();
        model.rotation.y = facingAngle();
        resumeWalking();
      }

      if (e.action === pause && state === "pause") {
        // 3 loops of pause stand finished — roll for next pause action
        pause.stop();
        rollPauseAction();
      }

    });

    // ── After walk ────────────────────────────────────────────────────────
    // walk: 18%, idle: 18%, pause: 17%, surprise: 17%, wave: 15%, turn: 15%
    function afterWalk() {
      const r = Math.random();

      if (r < 0.18) {
        resumeWalking();

      } else if (r < 0.36) {
        enterIdle();

      } else if (r < 0.53) {
        enterPause();

      } else if (r < 0.70) {
        enterSurprise();

      } else if (r < 0.85) {
        if (wave) {
          state = "wave";
          walk.stop();
          wave.reset().play();
        } else {
          resumeWalking();
        }

      } else {
        doTurn();
      }
    }

    // ── PAUSE ─────────────────────────────────────────────────────────────
    // Plays the 15 frame stand animation 3 times, then rolls for next action
    function enterPause() {
      if (!pause) { resumeWalking(); return; }

      state = "pause";
      walk.stop();
      model.rotation.y = facingAngle();
      pause.reset().play();
    }

    // After 3x pause loops: walk 40%, wave 15%, surprise 15%, idle 15%, pause 15%
    function rollPauseAction() {
      const r = Math.random();

      if (r < 0.40) {
        resumeWalking();

      } else if (r < 0.55) {
        if (wave) {
          state = "wave";
          wave.reset().play();
        } else {
          resumeWalking();
        }

      } else if (r < 0.70) {
        enterSurprise();

      } else if (r < 0.85) {
        enterIdle();

      } else {
        // Pause again — reset the 3x loop
        enterPause();
      }
    }

    // ── IDLE ──────────────────────────────────────────────────────────────
    // After idle: 70% idle again / 30% walk
    function enterIdle() {
      if (!idle) { resumeWalking(); return; }

      state = "idle";
      walk.stop();
      idle.reset().play();

      const onFinished = (e) => {
        if (e.action !== idle) return;
        mixer.removeEventListener("finished", onFinished);
        idle.stop();
        model.rotation.y = facingAngle();

        if (Math.random() < 0.70) enterIdle();
        else                       resumeWalking();
      };
      mixer.addEventListener("finished", onFinished);
    }

    // ── SURPRISE ──────────────────────────────────────────────────────────
    // Always exits to walk
    function enterSurprise() {
      if (!surprise) { resumeWalking(); return; }

      state = "surprise";
      walk.stop();
      surprise.reset().play();
    }

    // ── TURN ──────────────────────────────────────────────────────────────
    function doTurn() {
      if (state === "turn") return;

      state         = "turn";
      direction     = direction === "right" ? "left" : "right";
      pendingTurnTo = direction === "right" ? FACE_RIGHT : FACE_LEFT;

      walk.stop();

      if (turn) {
        turn.reset();
        turn.play();
      } else {
        setTimeout(() => {
          model.rotation.y = pendingTurnTo;
          pendingTurnTo = null;
          resumeWalking();
        }, 350);
      }
    }

    // ── WALK ──────────────────────────────────────────────────────────────
    function resumeWalking() {
      state = "walk";
      stepsRemaining = randomSteps();
      walk.reset().play();
    }

    function randomSteps() {
      return Math.floor(Math.random() * 5) + 1;
    }

    sims.push({
      model,
      mixer,
      state:     () => state,
      direction: () => direction,
      doTurn
    });

  });

});

// ── Animation loop ────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  sims.forEach(sim => {
    sim.mixer.update(delta);

    if (sim.state() === "walk") {
      const speed = 2;

      if (sim.direction() === "right")
        sim.model.position.x += delta * speed;
      else
        sim.model.position.x -= delta * speed;

      if (sim.model.position.x >  20 && sim.direction() === "right") sim.doTurn();
      if (sim.model.position.x < -20 && sim.direction() === "left")  sim.doTurn();
    }
  });

  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
